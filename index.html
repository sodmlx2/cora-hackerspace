<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cora Hacker Club - Projetos</title>
    <style>
        :root {
            --amarelo: #f7e348;
            --verde-escuro: #0a4d4d;
            --fundo: #051a1a;
            --texto: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--fundo);
            color: var(--texto);
        }

        /* Header com logo ao lado do texto */
        header {
            background-color: var(--amarelo);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .logo {
            max-width: 80px;
            height: auto;
            border-radius: 8px;
        }

        h1 {
            color: var(--verde-escuro);
            margin: 0;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }

        /* Estilo do bloco/pasta de projeto */
        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--amarelo);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .project-card:hover {
            background: rgba(247, 227, 72, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .project-card h2 {
            color: var(--amarelo);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .project-card p {
            color: #ccc;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <img src="./assets/logo.png" alt="Cora Hacker Club Logo" class="logo">
    <h1>Cora Hacker Club</h1>
</header>

<div class="container">
    <h2>📂 Visitas</h2>
    
    <a href="garoa.html" class="project-card">
        <h2><span>📍</span> Visita ao Garoa Hacker</h2>
        <p>Confira as fotos da nossa visita ao primeiro hackerspace do Brasil.</p>
        <small style="color: var(--amarelo); margin-top: 10px; display: block;">Clique para abrir a galeria →</small>
    </a>
</div>

<footer>
    <p style="text-align: center; margin-top: 100px; opacity: 0.5;">© 2026 | Cora Hacker Clube.</p>
</footer>

</body>
</html>
