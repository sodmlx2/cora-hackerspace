<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cora Hacker Club - Portfólio</title>
    <style>
        :root {
            --amarelo: #f7e348;
            --verde-escuro: #0a4d4d;
            --fundo: #051a1a;
            --texto: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Fira Code', monospace, sans-serif; /* Fonte estilo código */
            margin: 0;
            background-color: var(--fundo);
            color: var(--texto);
        }

        /* Header Horizontal */
        header {
            background-color: var(--amarelo);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo {
            max-width: 80px;
            height: auto;
        }

        .header-text {
            text-align: left;
        }

        header h1 {
            color: var(--verde-escuro);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--verde-escuro);
            margin: 0;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Estilo das Seções (Pastas de Projetos) */
        .project-section {
            margin-bottom: 60px;
            border-left: 4px solid var(--amarelo);
            padding-left: 20px;
        }

        .project-title {
            color: var(--amarelo);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(247, 227, 72, 0.1);
            transition: 0.3s;
        }

        .photo-card:hover {
            border-color: var(--amarelo);
            transform: scale(1.02);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
        }

        .photo-info {
            padding: 10px;
            font-size: 0.8rem;
            background: rgba(10, 77, 77, 0.4);
            color: var(--amarelo);
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid var(--verde-escuro);
            opacity: 0.6;
        }
    </style>
</head>
<body>

<header>
    <img src="./assets/logo.png" alt="Cora Logo" class="logo">
    <div class="header-text">
        <h1>Cora Hacker Club</h1>
        <p>> ~/projetos/galeria</p>
    </div>
</header>

<div class="container">

    <section class="project-section">
        <div class="project-title">
            <span>📂</span> VISITA_TECNICA_HACKERSPACE_01
        </div>
        <div class="gallery">
            <div class="photo-card">
                <img src="assets/foto1.jpg" alt="Foto 1">
                <div class="photo-info">img_01.jpg</div>
            </div>
            <div class="photo-card">
                <img src="assets/foto2.jpg" alt="Foto 2">
                <div class="photo-info">img_02.jpg</div>
            </div>
            </div>
    </section>

    <section class="project-section">
        <div class="project-title">
            <span>📂</span> WORKSHOP_HARDWARE_2024
        </div>
        <div class="gallery">
            <div class="photo-card">
                <img src="assets/foto3.jpg" alt="Foto 3">
                <div class="photo-info">pcb_design.jpg</div>
            </div>
            </div>
    </section>

</div>

<footer>
    <p>_terminal_cora_hacker_club_2026</p>
</footer>

</body>
</html>
